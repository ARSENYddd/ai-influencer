version: "3.9"

# ─────────────────────────────────────────────────────────────
#  AI Influencer — Infrastructure Stack
#
#  Services:
#    qdrant        — vector database (posts + caption embeddings)
#    n8n           — workflow automation (replaces scheduler.py)
#    pipeline_api  — FastAPI server (N8N → Python pipeline bridge)
#
#  Quick start:
#    docker compose up -d
#    open http://localhost:5678  (N8N, login: admin / changeme)
#    open http://localhost:6333/dashboard  (Qdrant)
#    open http://localhost:8000/docs       (FastAPI Swagger UI)
# ─────────────────────────────────────────────────────────────

services:

  # ── Qdrant vector database ──────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: ai_influencer_qdrant
    ports:
      - "6333:6333"   # HTTP REST API + Web dashboard
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── N8N workflow automation ─────────────────────────────────
  n8n:
    image: n8nio/n8n:1.44.1
    container_name: ai_influencer_n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      # Auth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: changeme      # ← change this!

      # Network
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/

      # Pipeline API connection (used in HTTP Request nodes)
      PIPELINE_API_URL: http://host.docker.internal:8000
      PIPELINE_API_SECRET: ${PIPELINE_API_SECRET:-changeme}

      # Timezone for accurate cron triggers
      GENERIC_TIMEZONE: Europe/Moscow
      TZ: Europe/Moscow

      # Disable telemetry
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"

    extra_hosts:
      # Allows N8N container to reach the FastAPI server running on the host
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── FastAPI pipeline server ─────────────────────────────────
  pipeline_api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai_influencer_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app                       # mount project root (for live reload in dev)
      - ./output:/app/output         # persist generated images and logs
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant            # override to reach the Docker service
      QDRANT_PORT: 6333
      API_RELOAD: "false"            # set to "true" for hot-reload in development
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
  n8n_data:
    driver: local
