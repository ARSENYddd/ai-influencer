<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Influencer Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">AI Influencer</div>
        <div class="nav-links">
            <a href="/" class="nav-link">Queue</a>
            <a href="/accounts" class="nav-link">Accounts</a>
            <a href="/analytics" class="nav-link">Analytics</a>
        </div>
        <div id="stats-bar" class="stats-bar">
            <span class="stat mia">Mia: <span id="stat-mia">--</span></span>
            <span class="stat zara">Zara: <span id="stat-zara">--</span></span>
            <span class="stat luna">Luna: <span id="stat-luna">--</span></span>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
